<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Family Investment Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module" src="./dashboard.js"></script>
</head>
<body class="bg-gray-100 font-sans">
  <!-- Navbar -->
  <nav class="bg-blue-600 text-white p-4 flex justify-between">
    <h1 class="text-xl font-bold">Family Wealth Dashboard</h1>
    <button id="logout-btn" class="bg-red-500 px-3 py-1 rounded">Logout</button>
  </nav>

  <!-- Dashboard -->
  <div class="max-w-6xl mx-auto p-6">
    <h2 class="text-2xl font-semibold mb-4">Overview</h2>

    <!-- Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- Equity -->
      <div class="bg-white p-4 rounded shadow">
        <h3 class="text-lg font-semibold">Equity</h3>
        <p id="equity-balance" class="text-2xl text-blue-600">₹0</p>
      </div>

      <!-- Mutual Funds -->
      <div class="bg-white p-4 rounded shadow">
        <h3 class="text-lg font-semibold">Mutual Funds</h3>
        <p id="mf-balance" class="text-2xl text-green-600">₹0</p>
      </div>

      <!-- Savings -->
      <div class="bg-white p-4 rounded shadow">
        <h3 class="text-lg font-semibold">Savings</h3>
        <p id="savings-balance" class="text-2xl text-purple-600">₹0</p>
      </div>

      <!-- FD -->
      <div class="bg-white p-4 rounded shadow">
        <h3 class="text-lg font-semibold">Fixed Deposits</h3>
        <p id="fd-balance" class="text-2xl text-orange-600">₹0</p>
      </div>

      <!-- Insurance -->
      <div class="bg-white p-4 rounded shadow col-span-1 md:col-span-2">
        <h3 class="text-lg font-semibold">Insurance Policies</h3>
        <ul id="insurance-list" class="list-disc pl-6"></ul>
      </div>
    </div>
  </div>
</body>
</html>
