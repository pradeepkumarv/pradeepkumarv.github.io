<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f3f4f6; margin: 0; padding: 20px; }
    h1 { text-align: center; }
    .controls { display: flex; justify-content: space-between; margin-bottom: 15px; }
    input { padding: 8px; width: 200px; border-radius: 6px; border: 1px solid #ccc; }
    button { padding: 8px 14px; border: none; border-radius: 6px; cursor: pointer; background: #2563eb; color: white; }
    button:hover { background: #1d4ed8; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
    th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
    th { background: #f9fafb; cursor: pointer; }
    tr:hover { background: #f1f5f9; }
  </style>
</head>
<body>
  <h1>Dashboard</h1>

  <div class="controls">
    <input type="text" id="search" placeholder="Search..." />
    <button id="logoutBtn">Logout</button>
  </div>

  <table>
    <thead>
      <tr>
        <th data-column="name" data-order="asc">Name ▲▼</th>
        <th data-column="email" data-order="asc">Email ▲▼</th>
        <th data-column="role" data-order="asc">Role ▲▼</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>

  <script type="module" src="./script.js"></script>
</body>
</html>
