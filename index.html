<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Investments Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">
  <div class="max-w-5xl mx-auto mt-10 p-6 bg-white rounded-2xl shadow-lg">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">📊 Investments Dashboard</h1>
    <table class="min-w-full border border-gray-300 rounded-lg shadow">
      <thead class="bg-blue-600 text-white">
        <tr>
          <th class="px-4 py-2 text-left">ID</th>
          <th class="px-4 py-2 text-left">Name</th>
          <th class="px-4 py-2 text-left">Type</th>
          <th class="px-4 py-2 text-left">Amount</th>
        </tr>
      </thead>
      <tbody id="investments-body" class="divide-y divide-gray-200">
        <!-- Supabase data will load here -->
      </tbody>
    </table>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
