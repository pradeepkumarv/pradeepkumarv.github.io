<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
</head>
<body>
  <h2>Investments Dashboard</h2>
  <form id="investment-form">
    <input type="text" id="name" placeholder="Investment Name" required /><br>
    <input type="text" id="type" placeholder="Type" required /><br>
    <input type="number" id="amount" placeholder="Amount Invested" required /><br>
    <button type="submit">Add Investment</button>
  </form>

  <div id="investment-list"></div>

  <script type="module" src="./dashboard.js"></script>
</body>
</html>
